<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edrilan Berisha — Developer / Engineer</title>
  <meta name="description" content="Edrilan Berisha — Developer / Engineer. Personal website coming soon." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Subtle animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(30, 80, 160, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(91, 188, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: min(420px, 85vw);
      height: auto;
      animation: fadeInDown 0.9s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* Divider line */
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #5bbcff, transparent);
      animation: fadeIn 1.1s 0.3s both;
    }

    /* Under construction badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(91, 188, 255, 0.25);
      border-radius: 99px;
      padding: 0.45rem 1.2rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5bbcff;
      animation: fadeIn 1.1s 0.5s both;
    }
    .badge__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5bbcff;
      box-shadow: 0 0 8px #5bbcff;
      animation: pulse 2s ease-in-out infinite;
    }

    /* Headline */
    .headline {
      animation: fadeInUp 0.9s 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .headline h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.2;
    }
    .headline h1 span {
      background: linear-gradient(90deg, #5bbcff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .headline p {
      margin-top: 0.85rem;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      max-width: 400px;
    }

    /* Projects link */
    .projects-link {
      animation: fadeInUp 0.9s 0.8s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .projects-link a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.6rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .projects-link a:hover {
      background: rgba(91,188,255,0.12);
      border-color: rgba(91,188,255,0.4);
      color: #fff;
    }
    .projects-link a svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transition: transform 0.2s;
    }
    .projects-link a:hover svg { transform: translateX(3px); }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
      z-index: 1;
      animation: fadeIn 1.5s 1s both;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #5bbcff; }
      50% { opacity: 0.5; box-shadow: 0 0 3px #5bbcff; }
    }
  </style>
</head>
<body>

  <div class="container">

    <img class="logo" src="imagesReadMe/eb-logo.png" alt="Edrilan Berisha — Developer / Engineer" />

    <div class="divider"></div>

    <div class="badge">
      <span class="badge__dot"></span>
      Under Construction
    </div>

    <div class="headline">
      <h1>Something <span>great</span> is coming.</h1>
      <p>My personal portfolio is being crafted with care.<br />Check back soon.</p>
    </div>

    <div class="projects-link">
      <a href="https://edrilanberisha.github.io/sapclouderplaunchpad" target="_blank" rel="noopener noreferrer">
        View my latest project
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </a>
    </div>

  </div>

  <footer class="footer">© 2026 Edrilan Berisha</footer>

</body>
</html>
